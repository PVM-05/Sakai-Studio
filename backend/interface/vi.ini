SubtitleAreaPixelToleranceXPixel = Dung sai trục X
SubtitleAreaPixelToleranceXPixelDesc = Xác định hộp phụ đề tương tự theo trục X (mặc định 20)
SubtitleTimelineBackwardFrameCount = Số khung lùi timeline
SubtitleTimelineBackwardFrameCountDesc = Thêm khung xử lý cho phụ đề xuất hiện dần (mặc định 3)
subtitleTimelineForwardFrameCount = Số khung tiến timeline
subtitleTimelineForwardFrameCountDesc = Thêm khung xử lý cho phụ đề biến mất dần (mặc định 3)
SttnNeighborStride = Bước khung tham chiếu
SttnNeighborStrideDesc = Mặc định: 5
SttnReferenceLength = Số khung tham chiếu
SttnReferenceLengthDesc = Mặc định: 10
SttnMaxLoadNum = Số khung xử lý tối đa
SttnMaxLoadNumDesc = Càng cao càng tốt (yêu cầu nhiều VRAM, mặc định 50)
PropainterMaxLoadNum = Số khung xử lý tối đa
PropainterMaxLoadNumDesc = Càng cao càng tốt (yêu cầu nhiều VRAM, mặc định 70)
CheckUpdateOnStartup = Kiểm tra cập nhật khi khởi động
CheckUpdateOnStartupDesc = Phiên bản mới ổn định hơn (khuyến nghị bật)
UpdatesAvailableTitle = Có bản cập nhật
UpdatesAvailableDesc = Phát hiện phiên bản mới {}, cập nhật?
NoUpdatesAvailableTitle = Không có cập nhật
NoUpdatesAvailableDesc = Đang dùng phiên bản mới nhất
ChooseDirectory = Chọn Thư Mục
SaveDirectory = Thư mục lưu video
SaveDirectoryDefault = Mặc định lưu vào thư mục hiện tại của video đầu vào
MaskDilation = Độ giãn nở mặt nạ
MaskDilationDesc = Độ rộng phần giãn nở bao phủ xung quanh viền phụ đề (0-50 px)
MaskDilationTooltip = Độ giãn nở ra phía ngoài của mặt nạ chữ. Nếu video bị sót lại viền đen của chữ hoặc bóng mờ sau khi xóa, hãy tăng thông số này lên (khuyên dùng: 8-12px).
MaskFeather = Làm mềm biên mặt nạ
MaskFeatherDesc = Độ làm mềm mượt biên mặt nạ tránh gãy pixel răng cưa (0-30 px)
MaskFeatherTooltip = Độ mờ nhòe biên mặt nạ (Alpha Feathering). Giúp làm mượt chuyển tiếp giữa khu vực được lấp đầy nền mới và video gốc, loại bỏ vệt cắt cứng sắc cạnh.
TemporalSmoothingRadius = Bán kính làm mịn thời gian
TemporalSmoothingRadiusDesc = Bán kính khung hình lân cận để lọc mượt chống nhấp nháy chuyển động (1-10)
TemporalSmoothingRadiusTooltip = Bán kính số khung hình liền trước/sau được lấy làm tham chiếu để tính toán mượt hóa thời gian. Số càng lớn lọc nhấp nháy càng tốt nhưng có thể gây bóng mờ trên cảnh chuyển động rất nhanh.
AddArea = Thêm vùng xóa
AddAreaTooltip = Thêm một vùng chọn mặc định ở nửa dưới màn hình để điều chỉnh thủ công.
PoissonBlending = Poisson Blending (泊松融合)
PoissonBlendingDesc = Hòa trộn mượt mà bằng thuật toán Poisson Blending
PoissonBlendingTooltip = Sử dụng thuật toán Poisson Blending để hòa trộn mượt mà biên giao thoa giữa vùng được xóa và video gốc, loại bỏ vệt cắt răng cưa.
TemporalSmoothing = Temporal Smoothing (Lọc mượt thời gian)
TemporalSmoothingDesc = Khử nhấp nháy, rung hạt nền bằng bộ lọc thích ứng chuyển động
TemporalSmoothingTooltip = Khử hiện tượng nhấp nháy hoặc rung hạt nhiễu (flickering) ở vùng inpaint bằng cách nội suy trung bình trọng số thích ứng chuyển động với các khung hình lân cận.
SharpenInpaintedArea = Làm nét vùng xóa (Sharpen Inpainted Area)
SharpenInpaintedAreaDesc = Làm nét nhẹ vùng nền sau khi xóa phụ đề
SharpenInpaintedAreaTooltip = Áp dụng bộ lọc Unsharp Mask làm nét cục bộ vùng ảnh sau khi xóa để bù đắp lại các chi tiết bị mờ do quá trình nội suy AI tạo ra.
MaskType = Kiểu mặt nạ xóa chữ (Mask Type)
MaskTypeDesc = Chọn phương pháp tạo mặt nạ phụ đề để xóa
MaskTypeTooltip = Chọn phương pháp che phủ dòng chữ:\n- Nét chữ (Stroke): Mặt nạ bám khít theo từng nét vẽ của chữ. Giúp giữ nguyên vẹn tối đa nền gốc xung quanh.\n- Hộp chữ nhật (Box): Che phủ toàn bộ hộp chữ nhật chứa chữ. Xóa sạch 100% nhưng vùng cần inpaint lớn hơn, dễ gây mờ nền.
MaskTypeStroke = Nét chữ (Stroke - Sạch nhất, không ghost)
MaskTypeBox = Hộp chữ nhật (Box - Kiểu cũ)
InterfaceLanguageTooltip = Chọn ngôn ngữ hiển thị cho giao diện phần mềm.
InpaintModeTooltip = Chọn mô hình AI để xóa phụ đề:\n- LaMa: Phù hợp nhất cho ảnh tĩnh, hoạt động rất nhanh.\n- STTN: Mô hình video trung cấp, đảm bảo tính liên kết thời gian tốt.\n- ProPainter: Mô hình video cao cấp nhất, khử nhấp nháy vượt trội.\n- OpenCV: Sử dụng thuật toán xử lý ảnh truyền thống, tốc độ cực nhanh nhưng chất lượng cơ bản.
SubtitleDetectModeTooltip = Chọn mô hình OCR phát hiện phụ đề:\n- Server: Mô hình PP-OCRv5 Server có độ chính xác rất cao, khuyên dùng.\n- Mobile: Mô hình PP-OCRv5 Mobile dung lượng nhẹ, tốc độ nhanh hơn nhưng dễ bị sót chữ hơn.
HardwareAccelerationTooltip = Bật hoặc Tắt tăng tốc đồ họa phần cứng GPU (CUDA hoặc DirectML).
SubtitleYXAxisDifferencePixelTooltip = Độ lệch kích thước tối đa giữa chiều rộng và chiều cao chữ để lọc bỏ các vùng phát hiện nhầm không phải phụ đề.
SubtitleAreaDeviationPixelTooltip = Độ lệch tối đa của vùng phụ đề cho phép để tránh cắt lẹm vào biên vùng chữ.
SubtitleAreaYAxisDifferencePixelTooltip = Độ lệch tối đa theo trục Y để gộp nhóm các dòng phụ đề xuất hiện đồng thời.
SubtitleAreaPixelToleranceYPixelTooltip = Dung sai sai lệch dòng theo trục Y khi xác định vị trí phụ đề ổn định theo chiều dọc.
SubtitleAreaPixelToleranceXPixelTooltip = Dung sai sai lệch dòng theo trục X khi xác định vùng ngang chứa phụ đề ổn định.
SubtitleTimelineBackwardFrameCountTooltip = Số khung hình mở rộng lùi về phía trước dòng thời gian (mặc định: 3 frames) giúp xử lý triệt để hiệu ứng chữ bắt đầu hiện (fade-in).
subtitleTimelineForwardFrameCountTooltip = Số khung hình mở rộng tiến về phía sau dòng thời gian (mặc định: 3 frames) giúp xử lý triệt để hiệu ứng chữ mờ dần biến mất (fade-out).
SttnNeighborStrideTooltip = Bước nhảy khung hình lân cận cho mô hình STTN. Giá trị nhỏ hơn sẽ mượt mà hơn nhưng tính toán chậm hơn.
SttnReferenceLengthTooltip = Số lượng khung hình tham chiếu dài hạn cho mô hình STTN nhằm đồng bộ chi tiết bối cảnh toàn video.
SttnMaxLoadNumTooltip = Số khung hình tối đa xử lý đồng thời trong một phân đoạn của STTN. Chỉ có hiệu lực khi tắt tính năng Tự động tối ưu GPU.
PropainterMaxLoadNumTooltip = Số khung hình tối đa xử lý đồng thời trong một phân đoạn của ProPainter. Chỉ có hiệu lực khi tắt tính năng Tự động tối ưu GPU.
SaveDirectoryTooltip = Chọn đường dẫn thư mục mặc định để xuất và lưu trữ video sau khi xử lý thành công.
CheckUpdateOnStartupTooltip = Tự động kiểm tra bản cập nhật mới từ GitHub mỗi khi bạn khởi động ứng dụng.
GpuInfoTooltip = Hiển thị thông tin tên GPU đồ họa, dung lượng VRAM thực tế và hạn mức số khung hình được phân bổ tối đa cho việc xử lý đồng thời.



