SaveDirectory = Video save directory
SaveDirectoryDefault = Default save to the current directory of the input video 
MaskDilation = Mask Dilation
MaskDilationDesc = Dilation size around subtitle borders (0-50 px)
MaskDilationTooltip = Expansion size of the text mask. If subtitle outlines or drop shadows are left behind after inpainting, increase this value (recommended: 8-12px).
MaskFeather = Mask Feathering
MaskFeatherDesc = Feathering size to smooth mask edges (0-30 px)
MaskFeatherTooltip = Feathering size (Alpha Feathering). Helps smooth the transition between the inpainted region and the original video background, removing hard cut edges.
TemporalSmoothingRadius = Temporal Smoothing Radius
TemporalSmoothingRadiusDesc = Neighboring frames radius to filter out motion flickering (1-10)
TemporalSmoothingRadiusTooltip = Radius of neighboring frames referenced for temporal smoothing. Larger values reduce flickering but may cause ghosting status on fast-moving scenes.
AddArea = Add Region
AddAreaTooltip = Add a default selection area at the bottom of the screen for manual adjustment.
PoissonBlending = Poisson Blending
PoissonBlendingDesc = Smooth blending using Poisson Blending algorithm
PoissonBlendingTooltip = Use Poisson Blending to smoothly blend the inpainted area with the original video frame to remove harsh seam edges.
TemporalSmoothing = Temporal Smoothing
TemporalSmoothingDesc = Reduce background flickering using motion-adaptive filter
TemporalSmoothingTooltip = Reduce flickering and background noise in the inpainted region by motion-adaptive weighted interpolation over neighboring frames.
SharpenInpaintedArea = Sharpen Inpainted Area
SharpenInpaintedAreaDesc = Slightly sharpen the background after subtitle removal
SharpenInpaintedAreaTooltip = Apply local Unsharp Mask filter on the inpainted area to recover details blurred by AI interpolation.
MaskType = Mask Type
MaskTypeDesc = Select the method to generate subtitle mask
MaskTypeTooltip = Select subtitle masking method:\n- Stroke: Mask tightly follows character shapes. Preserves maximum background details.\n- Box: Mask covers the entire bounding rectangle. Cleaner removal but requires larger inpainting area.
MaskTypeStroke = Stroke (Cleanest, no ghosting)
MaskTypeBox = Box (Legacy)


