MaskDilation = Mask Dilation
MaskDilationDesc = Dilation size around subtitle borders (0-50 px)
MaskDilationTooltip = Expansion size of the text mask. If subtitle outlines or drop shadows are left behind after inpainting, increase this value (recommended: 8-12px).
MaskFeather = Mask Feathering
MaskFeatherDesc = Feathering size to smooth mask edges (0-30 px)
MaskFeatherTooltip = Feathering size (Alpha Feathering). Helps smooth the transition between the inpainted region and the original video background, removing hard cut edges.
TemporalSmoothingRadius = Temporal Smoothing Radius
TemporalSmoothingRadiusDesc = Neighboring frames radius to filter out motion flickering (1-10)
TemporalSmoothingRadiusTooltip = Radius of neighboring frames referenced for temporal smoothing. Larger values reduce flickering but may cause ghosting status on fast-moving scenes.
AddArea = Add Region
AddAreaTooltip = Add a default selection area at the bottom of the screen for manual adjustment.
PoissonBlending = Poisson Blending
PoissonBlendingDesc = Smooth blending using Poisson Blending algorithm
PoissonBlendingTooltip = Use Poisson Blending to smoothly blend the inpainted area with the original video frame to remove harsh seam edges.
TemporalSmoothing = Temporal Smoothing
TemporalSmoothingDesc = Reduce background flickering using motion-adaptive filter
TemporalSmoothingTooltip = Reduce flickering and background noise in the inpainted region by motion-adaptive weighted interpolation over neighboring frames.
SharpenInpaintedArea = Sharpen Inpainted Area
SharpenInpaintedAreaDesc = Slightly sharpen the background after subtitle removal
SharpenInpaintedAreaTooltip = Apply local Unsharp Mask filter on the inpainted area to recover details blurred by AI interpolation.
MaskType = Mask Type
MaskTypeDesc = Select the method to generate subtitle mask
MaskTypeTooltip = Select subtitle masking method:\n- Stroke: Mask tightly follows character shapes. Preserves maximum background details.\n- Box: Mask covers the entire bounding rectangle. Cleaner removal but requires larger inpainting area.
MaskTypeStroke = Stroke (Cleanest, no ghosting)
MaskTypeBox = Box (Legacy)

InterfaceLanguageTooltip = Select the display language for the application user interface.
InpaintModeTooltip = Select the AI model for subtitle removal:\n- LaMa: Best for static images, works very fast.\n- STTN: Medium-tier video model, ensures good temporal coherence.\n- ProPainter: Most advanced video model, outstanding flicker reduction.\n- OpenCV: Traditional image processing algorithm, ultra-fast speed but basic quality.
SubtitleDetectModeTooltip = Select the OCR model for subtitle detection:\n- Server: PP-OCRv5 Server model with very high accuracy, recommended.\n- Mobile: PP-OCRv5 Mobile lightweight model, faster speed but may miss some text.
HardwareAccelerationTooltip = Enable or Disable GPU hardware graphics acceleration (CUDA or DirectML).
SubtitleYXAxisDifferencePixelTooltip = Maximum size difference between character width and height to filter out false positive non-subtitle regions.
SubtitleAreaDeviationPixelTooltip = Maximum allowed offset for the subtitle area to prevent clipping the edges of character regions.
SubtitleAreaYAxisDifferencePixelTooltip = Maximum Y-axis deviation to group subtitle lines appearing concurrently.
SubtitleAreaPixelToleranceYPixelTooltip = Y-axis alignment tolerance when determining stable vertical subtitle positions.
SubtitleAreaPixelToleranceXPixelTooltip = X-axis alignment tolerance when determining stable horizontal subtitle areas.
SubtitleTimelineBackwardFrameCountTooltip = Number of frames to expand backwards along the timeline (default: 3 frames) to fully process text fade-in effects.
subtitleTimelineForwardFrameCountTooltip = Number of frames to expand forwards along the timeline (default: 3 frames) to fully process text fade-out effects.
SttnNeighborStrideTooltip = Neighbor frame stride for STTN model. Smaller values are smoother but slower.
SttnReferenceLengthTooltip = Number of long-term reference frames for STTN model to synchronize global video background details.
SttnMaxLoadNumTooltip = Maximum frames processed simultaneously in a single STTN segment. Only active when Auto Hardware Tuning is disabled.
PropainterMaxLoadNumTooltip = Maximum frames processed simultaneously in a single ProPainter segment. Only active when Auto Hardware Tuning is disabled.
SaveDirectoryTooltip = Select the default directory path to export and save videos after successful processing.
CheckUpdateOnStartupTooltip = Automatically check for new updates from GitHub each time the application starts.
GpuInfoTooltip = Display GPU name, physical VRAM capacity, and maximum frames allocated for concurrent processing.

